<!DOCTYPE html>
<html lang="zh">
<head>
<meta charset="UTF-8">
<title>基因Bingo计算器（终极版）</title>
<style>
body { font-family: Arial; padding: 20px; }
.grid { display: grid; grid-template-columns: repeat(3, 180px); gap: 12px; }
.cell { border: 2px solid #ccc; padding: 10px; border-radius: 10px; position: relative; }
select, input { width: 100%; margin-top: 5px; }
button { margin-top: 10px; padding: 6px 12px; }
.result { margin-top: 20px; }
.name { font-weight: bold; }
.delete-btn { position:absolute; top:5px; right:5px; cursor:pointer; color:red; }

.attr-火 { background:#ffb3b3; }
.attr-水 { background:#b3e0ff; }
.attr-冰 { background:#e0ffff; }
.attr-雷 { background:#fff0b3; }
.attr-龙 { background:#e6ccff; }
.attr-无 { background:#eee; }
.attr-彩虹 { background: linear-gradient(45deg, red, orange, yellow, green, blue, purple); color:white; }

.highlight { border:3px solid red !important; }

.combo { position: relative; }
.combo input { padding: 5px 25px 5px 25px; box-sizing: border-box; }
.icon { position:absolute; top:8px; font-size:12px; pointer-events:none; }
.icon.left { left:6px; }
.icon.right { right:6px; }

.dropdown {
  position:absolute;
  top:100%;
  left:0;
  width:100%;
  background:#fff;
  border:1px solid #ccc;
  max-height:150px;
  overflow-y:auto;
  z-index:10;
}
.dropdown div {
  padding:5px;
  cursor:pointer;
}
.dropdown div:hover {
  background:#eee;
}
</style>
</head>
<body>

<h2>基因九宫格</h2>
<div class="grid" id="grid"></div>
<button onclick="calculate()">计算最优排列</button>

<hr>

<h2>最佳Bingo结果</h2>
<div class="result" id="result"></div>

<hr>

<h2>预设基因管理</h2>
<input id="newName" placeholder="技能名">
<select id="newAttr"></select>
<select id="newType"></select>
<input id="newCost" placeholder="消耗">
<input id="newPower" placeholder="威力">
<input id="newBreak" placeholder="破龙力">

<button onclick="addPreset()">添加预设</button>
<div id="presetList"></div>

<script>
const defaultGenes = [
  {name:"彩虹基因",attr:"彩虹",type:"彩虹",power:"",cost:"",break:""},
  {name:"雷电领域",attr:"雷",type:"技",power:"70",cost:"20",break:"50"},
  {name:"雷霆震击+",attr:"雷",type:"速",power:"70",cost:"20",break:"50"},
  {name:"炎舞踏廻",attr:"火",type:"技",power:"90",cost:"30",break:"50"},
  {name:"熔岩翻腾",attr:"火",type:"技",power:"80",cost:"30",break:"50"},
  {name:"睡眠粉塵",attr:"水",type:"技",power:"30",cost:"25",break:"60"},
  {name:"寒冰冲击",attr:"冰",type:"速",power:"90",cost:"30",break:"40"},
  {name:"白色光线",attr:"冰",type:"力",power:"60",cost:"15",break:"40"},
  {name:"六星孵技·冰块碎裂",attr:"冰",type:"速",power:"40",cost:"20",break:"60"},
  {name:"冰冲击",attr:"冰",type:"无",power:"240",cost:"30",break:"50"},

  {name:"凿击",attr:"龙",type:"速",power:"60",cost:"15",break:"40"},
  {name:"耐力回复",attr:"雷",type:"速",power:"",cost:"",break:""},
  {name:"属性破龙",attr:"冰",type:"速",power:"",cost:"",break:""},
  {name:"会心",attr:"龙",type:"速",power:"",cost:"",break:""},
  {name:"破龙强化",attr:"龙",type:"技",power:"",cost:"",break:""},
  {name:"加速",attr:"水",type:"速",power:"",cost:"",break:""},
  {name:"回血",attr:"火",type:"速",power:"",cost:"",break:""},
  {name:"魂之羁绊",attr:"无",type:"速",power:"",cost:"",break:""},
  {name:"体力增强",attr:"无",type:"力",power:"",cost:"",break:""}
];

let presetGenes = JSON.parse(localStorage.getItem("genes")) || defaultGenes;

const attributes = ["火","水","冰","雷","龙","无","彩虹"];
const types = ["力","速","技","无","彩虹"];
const typeIcons = {"力":"💪","速":"⚡","技":"🎯","无":"🚫","彩虹":"🌈"};

function saveData(){ localStorage.setItem("genes", JSON.stringify(presetGenes)); }

function renderPresetList(){
  const div = document.getElementById("presetList");
  div.innerHTML = presetGenes.map((g,index)=>
    `<div class="cell attr-${g.attr}">
      <div class="delete-btn" onclick="deletePreset(${index})">✖</div>
      <div class="name">${g.name}</div>
      <div>${g.attr}/${g.type} ${typeIcons[g.type]}</div>
      <div>消耗: ${g.cost || "-"}</div>
      <div>威力: ${g.power || "-"}</div>
      <div>破龙力: ${g.break || "-"}</div>
    </div>`
  ).join("");
}

function addPreset(){
  const name = document.getElementById("newName").value.trim();
  const attr = document.getElementById("newAttr").value;
  const type = document.getElementById("newType").value;

  if(!name) return alert("请输入名称");
  if(presetGenes.some(g=>g.name === name)) return alert("基因名称不能重复！");

  const cost = document.getElementById("newCost").value;
  const power = document.getElementById("newPower").value;
  const br = document.getElementById("newBreak").value;

  presetGenes.push({name,attr,type,cost,power,break:br});
  saveData(); renderPresetList(); buildGrid();
}

function deletePreset(index){
  if(!confirm("确定删除该基因？")) return;
  presetGenes.splice(index,1);
  saveData(); renderPresetList(); buildGrid();
}

function initSelectors(){
  document.getElementById("newAttr").innerHTML = attributes.map(a=>`<option>${a}</option>`).join("");
  document.getElementById("newType").innerHTML = types.map(t=>`<option>${t}</option>`).join("");
}

function buildGrid(){
  const grid = document.getElementById("grid");
  grid.innerHTML = "";

  for(let i=0;i<9;i++){
    const div = document.createElement("div");
    div.className = "cell";

    div.innerHTML = `
      <div class="name">基因 ${i+1}</div>
      <div class="combo">
        <span class="icon left">🔍</span>
        <input class="search" placeholder="搜索技能">
        <span class="icon right">▼</span>
        <div class="dropdown"></div>
      </div>
      <div class="attr"></div>
      <div class="type"></div>
    `;

    grid.appendChild(div);
  }

  const searches = document.querySelectorAll(".search");
  const dropdowns = document.querySelectorAll(".dropdown");

  searches.forEach((input,i)=>{
    const dropdown = dropdowns[i];

    function renderList(list){
      dropdown.innerHTML = list.map(g=>`<div>${g.name}</div>`).join("");

      dropdown.querySelectorAll("div").forEach(item=>{
        item.onclick = ()=>{
          const g = presetGenes.find(x=>x.name === item.innerText);
          input.value = g.name;

          const cell = document.querySelectorAll(".cell")[i];
          cell.className = "cell attr-" + g.attr;

          cell.querySelector(".attr").innerText = "属性: " + g.attr;
          cell.querySelector(".type").innerText = "倾向: " + g.type + " " + typeIcons[g.type];

          dropdown.innerHTML = "";
        };
      });
    }

    input.oninput = ()=>{
      const keyword = input.value.toLowerCase();
      const list = presetGenes.filter(g=>g.name.toLowerCase().includes(keyword));
      renderList(list);
    };

    input.onfocus = ()=>{
      if(!input.value){ renderList(presetGenes); }
    };

    input.onclick = ()=>{
      if(!input.value){ renderList(presetGenes); }
    };

    input.onblur = ()=>{
      setTimeout(()=> dropdown.innerHTML = "",200);
    };
  });
}

const lines = [
  [0,1,2,"横1"],[3,4,5,"横2"],[6,7,8,"横3"],
  [0,3,6,"竖1"],[1,4,7,"竖2"],[2,5,8,"竖3"],
  [0,4,8,"斜1"],[2,4,6,"斜2"]
];

function checkAttribute(line, board){
  let vals = line.map(i=>board[i].attr);
  let nonRainbow = vals.filter(v=>v!=="彩虹");
  return new Set(nonRainbow).size<=1;
}

function checkType(line, board){
  let vals = line.map(i=>board[i].type);
  if(vals.includes("无")) return false;
  let nonRainbow = vals.filter(v=>v!=="彩虹");
  return new Set(nonRainbow).size<=1;
}

function evaluate(board){
  let score=0;
  let highlights=new Set();
  let detail=[];

  lines.forEach(l=>{
    const idx=l.slice(0,3);
    const name=l[3];

    if(checkAttribute(idx,board)){
      score++;
      detail.push(name+"：属性Bingo");
      idx.forEach(i=>highlights.add(i));
    }

    if(checkType(idx,board)){
      score++;
      detail.push(name+"：倾向Bingo");
      idx.forEach(i=>highlights.add(i));
    }
  });

  return {score,highlights,detail};
}

function permute(arr){
  if(arr.length<=1) return [arr];
  let res=[];
  for(let i=0;i<arr.length;i++){
    const rest=permute(arr.slice(0,i).concat(arr.slice(i+1)));
    for(const r of rest){ res.push([arr[i],...r]); }
  }
  return res;
}

function calculate(){
  const inputs=document.querySelectorAll(".search");

  let genes=[];
  let used=new Set();

  for(let i=0;i<9;i++){
    let name = inputs[i].value;
    let g = presetGenes.find(x=>x.name === name);

    if(!g){ alert("有未选择的基因"); return; }

    if(used.has(g.name)){
      alert("不能重复基因: "+g.name);
      return;
    }

    used.add(g.name);
    genes.push(g);
  }

  let bestScore=0,best=null,bestEval=null;

  for(const p of permute(genes)){
    const ev=evaluate(p);
    if(ev.score>bestScore){bestScore=ev.score;best=p;bestEval=ev;}
  }

  let html=`<h3>最高Bingo: ${bestScore}</h3>`;

  html+="<div class='grid'>";
  for(let i=0;i<9;i++){
    let c=bestEval.highlights.has(i)?"highlight":"";
    html+=`<div class='cell attr-${best[i].attr} ${c}'>
      <div class='name'>${best[i].name}</div>
      <div>${best[i].attr}/${best[i].type}</div>
      <div>${typeIcons[best[i].type]}</div>
    </div>`;
  }
  html+="</div>";

  html+="<h3>Bingo明细</h3>";
  html+=bestEval.detail.map(d=>`<div>${d}</div>`).join("");

  document.getElementById("result").innerHTML=html;
}

initSelectors();
renderPresetList();
buildGrid();
</script>
</body>
</html>
